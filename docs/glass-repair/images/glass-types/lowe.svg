<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Low-Eガラス：窓枠＋太陽と遮熱矢印 -->
  <rect x="8" y="12" width="28" height="40" rx="2" stroke="#1F3A5F" stroke-width="2"/>
  <!-- Low-Eコーティング層 -->
  <line x1="8" y1="20" x2="36" y2="20" stroke="#5F7A6C" stroke-width="2" stroke-linecap="round"/>
  <!-- 太陽（右側） -->
  <circle cx="50" cy="24" r="7" stroke="#5F7A6C" stroke-width="1.5"/>
  <line x1="50" y1="12" x2="50" y2="10" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="50" y2="38" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="24" x2="36" y2="24" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="24" x2="60" y2="24" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 遮熱の矢印（太陽→ガラスで跳ね返る） -->
  <line x1="46" y1="32" x2="40" y2="38" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="40,32 40,38 46,38" stroke="#5F7A6C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
